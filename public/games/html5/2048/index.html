<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f1a; color: #eee; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    h1 { font-size: 2.5rem; background: linear-gradient(135deg, #e94560, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .score { background: #1a1a2e; padding: 8px 20px; border-radius: 8px; text-align: center; }
    .score .label { font-size: 0.7rem; color: #a0a0b8; text-transform: uppercase; }
    .score .value { font-size: 1.3rem; font-weight: 700; }
    #grid { display: grid; grid-template-columns: repeat(4, 80px); grid-template-rows: repeat(4, 80px); gap: 8px; background: #1a1a2e; padding: 8px; border-radius: 12px; }
    .tile { display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 1.5rem; font-weight: 700; transition: all 0.12s; }
    .controls { margin-top: 20px; display: flex; gap: 10px; }
    .controls button, .back { padding: 10px 20px; background: #e94560; border: none; border-radius: 8px; color: #fff; font-size: 0.95rem; cursor: pointer; }
    .controls button:hover, .back:hover { background: #ff6b81; }
    .back { position: absolute; top: 16px; left: 16px; text-decoration: none; }
    .msg { margin-top: 16px; font-size: 1.2rem; color: #ff6b81; }
  </style>
</head>
<body>
  <a href="../../games/index.html" class="back">&#8592; Back</a>
  <div class="header">
    <h1>2048</h1>
    <div class="score"><div class="label">Score</div><div class="value" id="score">0</div></div>
  </div>
  <div id="grid"></div>
  <div class="msg" id="msg"></div>
  <div class="controls"><button onclick="init()">New Game</button></div>
  <script>
    const colors = { 0:'#16213e', 2:'#2a3a5c', 4:'#2e4a6e', 8:'#e94560', 16:'#d63851', 32:'#c42d44', 64:'#b02238', 128:'#edc22e', 256:'#edbe00', 512:'#edb800', 1024:'#edb200', 2048:'#edac00' };
    const textColors = { 0:'transparent', 2:'#eee', 4:'#eee', 8:'#fff', 16:'#fff', 32:'#fff', 64:'#fff', 128:'#fff', 256:'#fff', 512:'#fff', 1024:'#fff', 2048:'#fff' };
    let grid, score;

    function init() {
      grid = Array(4).fill(null).map(() => Array(4).fill(0));
      score = 0;
      document.getElementById('msg').textContent = '';
      addRandom(); addRandom(); render();
    }

    function addRandom() {
      const empty = [];
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (grid[r][c] === 0) empty.push([r, c]);
      if (empty.length === 0) return;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function render() {
      const el = document.getElementById('grid');
      el.innerHTML = '';
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
        const v = grid[r][c];
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.textContent = v || '';
        tile.style.background = colors[v] || '#edac00';
        tile.style.color = textColors[v] || '#fff';
        if (v >= 1024) tile.style.fontSize = '1.1rem';
        el.appendChild(tile);
      }
      document.getElementById('score').textContent = score;
    }

    function slide(row) {
      let arr = row.filter(v => v !== 0);
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) { arr[i] *= 2; score += arr[i]; arr[i + 1] = 0; }
      }
      arr = arr.filter(v => v !== 0);
      while (arr.length < 4) arr.push(0);
      return arr;
    }

    function move(dir) {
      let moved = false;
      const prev = JSON.stringify(grid);
      if (dir === 'left') { for (let r = 0; r < 4; r++) grid[r] = slide(grid[r]); }
      else if (dir === 'right') { for (let r = 0; r < 4; r++) grid[r] = slide([...grid[r]].reverse()).reverse(); }
      else if (dir === 'up') { for (let c = 0; c < 4; c++) { const col = slide([grid[0][c], grid[1][c], grid[2][c], grid[3][c]]); for (let r = 0; r < 4; r++) grid[r][c] = col[r]; } }
      else if (dir === 'down') { for (let c = 0; c < 4; c++) { const col = slide([grid[3][c], grid[2][c], grid[1][c], grid[0][c]]).reverse(); for (let r = 0; r < 4; r++) grid[r][c] = col[r]; } }
      if (JSON.stringify(grid) !== prev) { addRandom(); render(); checkState(); }
    }

    function checkState() {
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) { if (grid[r][c] === 2048) { document.getElementById('msg').textContent = 'You win!'; return; } if (grid[r][c] === 0) return; }
      for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) { if (c < 3 && grid[r][c] === grid[r][c+1]) return; if (r < 3 && grid[r][c] === grid[r+1][c]) return; }
      document.getElementById('msg').textContent = 'Game Over!';
    }

    document.addEventListener('keydown', e => {
      const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
      if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
    });

    // Touch support
    let touchStartX, touchStartY;
    document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
    });

    init();
  </script>
</body>
</html>
