<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-slot"></div>
    <main class="main narrow">
      <div class="page-header">
        <h2>Settings</h2>
        <p>Configure stealth behavior, panic redirect, and proxy backend endpoint.</p>
      </div>
      <div class="setting-group">
        <h3>Tab Cloak</h3>
        <label>Disguise this tab as another site.</label>
        <select id="cloak-select">
          <option value="">None</option>
          <option value="google-docs">Google Docs</option>
          <option value="google-drive">Google Drive</option>
          <option value="clever">Clever</option>
          <option value="canvas">Canvas</option>
          <option value="gmail">Gmail</option>
        </select>
      </div>
      <div class="setting-group">
        <h3>Panic URL</h3>
        <label>Press <kbd>`</kbd> or <kbd>Shift+Esc</kbd> to redirect.</label>
        <input type="url" id="panic-url" placeholder="https://www.google.com">
      </div>
      <div class="setting-group">
        <h3>Proxy Backend</h3>
        <label>Ultraviolet-compatible backend URL.</label>
        <input type="url" id="backend-url" placeholder="https://your-backend.koyeb.app">
      </div>
      <button class="btn" id="save-btn">Save</button>
    </main>
  </div>
  <script type="module" src="/src/pages/settings.ts"></script>
</body>
</html>
