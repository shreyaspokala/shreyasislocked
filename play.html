<!DOCTYPE html>
<html lang="en" class="play-page">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play</title>
  <link rel="stylesheet" href="/src/styles/style.css">
</head>
<body>
  <div class="play-wrap">
    <div class="play-bar">

  </div>
  <script type="module" src="/src/pages/play.ts"></script>

</html>
